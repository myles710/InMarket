<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Product Intelligence Agent</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #050712;
        --bg-elevated: #101322;
        --bg-input: #14182a;
        --border-subtle: #232742;
        --accent: #4f8bff;
        --accent-soft: rgba(79, 139, 255, 0.12);
        --accent-strong: rgba(79, 139, 255, 0.3);
        --text-primary: #f7f7ff;
        --text-secondary: #a6acc7;
        --danger: #ff5c7a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #131735 0, #050712 55%);
        color: var(--text-primary);
        min-height: 100vh;
      }

      #root {
        min-height: 100vh;
      }

      .app-shell {
        min-height: 100vh;
        display: flex;
        align-items: stretch;
        justify-content: center;
        padding: 24px;
      }

      .chat-card {
        width: 100%;
        max-width: 960px;
        background: linear-gradient(135deg, #0b0f20 0, #080a14 55%, #050712 100%);
        border-radius: 18px;
        border: 1px solid var(--border-subtle);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .chat-header {
        padding: 18px 20px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .chat-title {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .chat-title-main {
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .chat-title-sub {
        font-size: 12px;
        color: var(--text-secondary);
      }

      .status-pill {
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(20, 168, 92, 0.12);
        color: #63e6be;
        border: 1px solid rgba(20, 168, 92, 0.35);
      }

      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: #63e6be;
        box-shadow: 0 0 0 4px rgba(99, 230, 190, 0.18);
      }

      .chat-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 12px 16px 10px;
        gap: 12px;
      }

      .messages-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 8px 4px 4px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .messages-scroll::-webkit-scrollbar {
        width: 8px;
      }
      .messages-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      .messages-scroll::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.06);
        border-radius: 999px;
      }

      .msg-row {
        display: flex;
        width: 100%;
      }

      .msg-row.user {
        justify-content: flex-end;
      }

      .msg-row.agent {
        justify-content: flex-start;
      }

      .msg-bubble {
        max-width: min(80%, 680px);
        padding: 10px 12px;
        border-radius: 14px;
        font-size: 14px;
        line-height: 1.45;
        border: 1px solid transparent;
        word-wrap: break-word;
        white-space: pre-wrap;
      }

      .msg-bubble.user {
        background: linear-gradient(135deg, var(--accent) 0, #79a8ff 100%);
        color: #020412;
        border-color: rgba(255, 255, 255, 0.12);
      }

      .msg-bubble.agent {
        background: var(--bg-elevated);
        border-color: var(--border-subtle);
      }

      .msg-meta {
        margin-top: 4px;
        font-size: 10px;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .tool-tag {
        padding: 2px 6px;
        border-radius: 999px;
        border: 1px solid rgba(79, 139, 255, 0.6);
        background: var(--accent-soft);
        color: #c4d5ff;
      }

      .input-bar {
        display: flex;
        align-items: flex-end;
        gap: 8px;
        padding: 10px 12px 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.04);
        background: radial-gradient(circle at top, #161b33 0, #050712 70%);
      }

      .input-wrapper {
        flex: 1;
        display: flex;
        align-items: center;
        background: var(--bg-input);
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 6px 12px;
        gap: 8px;
      }

      .input-wrapper:focus-within {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px var(--accent-strong);
      }

      .input-field {
        flex: 1;
        border: none;
        outline: none;
        background: transparent;
        color: var(--text-primary);
        font-size: 14px;
        padding: 4px 0;
      }

      .input-field::placeholder {
        color: rgba(166, 172, 199, 0.7);
      }

      .send-button {
        border: none;
        outline: none;
        padding: 8px 14px;
        border-radius: 999px;
        background: var(--accent);
        color: #020412;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition: background 0.15s ease, transform 0.05s ease,
          box-shadow 0.15s ease, opacity 0.15s ease;
        box-shadow: 0 10px 30px rgba(79, 139, 255, 0.45);
      }

      .send-button[disabled] {
        opacity: 0.6;
        cursor: default;
        box-shadow: none;
      }

      .send-button:not([disabled]):hover {
        background: #6d9cff;
      }

      .send-button:not([disabled]):active {
        transform: translateY(1px);
        box-shadow: 0 6px 18px rgba(79, 139, 255, 0.4);
      }

      .loading-indicator {
        font-size: 11px;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        gap: 6px;
        padding-left: 4px;
      }

      .loading-dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--accent);
        animation: loadingPulse 1s infinite ease-in-out;
      }

      .loading-dot:nth-child(2) {
        animation-delay: 0.15s;
      }
      .loading-dot:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes loadingPulse {
        0% {
          opacity: 0.2;
          transform: translateY(0);
        }
        50% {
          opacity: 1;
          transform: translateY(-2px);
        }
        100% {
          opacity: 0.2;
          transform: translateY(0);
        }
      }

      @media (max-width: 640px) {
        .app-shell {
          padding: 8px;
        }
        .chat-card {
          border-radius: 14px;
        }
        .msg-bubble {
          max-width: 92%;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
